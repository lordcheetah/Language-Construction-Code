name: Release

# On pushing a version tag (e.g. v0.1.0), build the wheel + source distribution, then attach
# them to a GitHub Release and publish them to PyPI. Build/test runs once; the two publish jobs
# reuse the same artifacts. PyPI upload uses OIDC "trusted publishing" — no API token/secret.
on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify the tag matches the project version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          ver="$(python -c "import tomllib, pathlib; print(tomllib.loads(pathlib.Path('pyproject.toml').read_text())['project']['version'])")"
          echo "tag=$tag  pyproject=$ver"
          if [ "$tag" != "$ver" ]; then
            echo "::error::tag $GITHUB_REF_NAME does not match pyproject version $ver" >&2
            exit 1
          fi

      - name: Install build + test tools
        run: python -m pip install --upgrade build pytest

      - name: Run the test suite
        env:
          PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
        run: python -m pytest -q

      - name: Build the wheel + sdist
        run: python -m build

      - name: Upload the distributables
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  github-release:
    name: Attach to GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write  # create the release and upload the assets
    steps:
      - name: Download the distributables
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish the GitHub Release with the distributables
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          fail_on_unmatched_files: true

  pypi-publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    # PyPI "trusted publisher" config must name this environment (see README "Install & release").
    environment:
      name: pypi
      url: https://pypi.org/p/conlang
    permissions:
      id-token: write  # mint the OIDC token PyPI trusts; no stored secret needed
    steps:
      - name: Download the distributables
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
